<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>University of Anglia Internship Portal</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<h2>University of East Anglia</h2>

<a href="https://www.uea.ac.uk/" target="_blank">
More Details
</a>

</header>


<section class="banner">

<img src="https://www.isepjobs.org/getasset/9bb9b4dc-403d-4073-b842-74f901c30678/">

<div class="banner-text">

<h1>International Summer Internship</h1>

<p>Global Research Fellowship Program</p>

</div>

</section>


<div class="container">

<h2>Internship Application Form</h2>

<form id="form" enctype="multipart/form-data">

<h3>Personal Information</h3>

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email Address" required>

<input type="text" name="phone" placeholder="Phone Number">

<textarea name="address" placeholder="Full Address"></textarea>

<input type="text" name="nationality" placeholder="Nationality">

<input type="text" name="passport" placeholder="Passport Number">

<input type="text" name="university" placeholder="University Name">

<input type="text" name="degree" placeholder="Degree Program">


<h3>Semester Marks</h3>

<input type="text" name="semester1" placeholder="Semester 1 Marks">

<input type="text" name="semester2" placeholder="Semester 2 Marks">

<input type="text" name="semester3" placeholder="Semester 3 Marks">

<input type="text" name="semester4" placeholder="Semester 4 Marks">


<h3>Upload Documents</h3>

<label>Upload Visa</label>
<input type="file" name="visa">

<label>Upload Identity Card</label>
<input type="file" name="idcard">

<label>Upload CV / Resume</label>
<input type="file" name="cv">

<button type="submit">Submit Application</button>

</form>

</div>


<footer>

<p>© 2026 University of Alinga Internship Portal</p>

<a href="https://www.uea.ac.uk/" target="_blank">
Visit University of East Anglia
</a>

</footer>

<script src="script.js"></script>

</body>
</html>

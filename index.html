<!DOCTYPE html>
<html>
<head>

<title>University of Alinga Internship</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<h1>University of Alinga</h1>

<a class="more" href="https://www.uea.ac.uk/" target="_blank">More Details</a>

</header>

<section class="banner">

<h2>International Summer Internship Program</h2>

</section>

<div class="container">

<h2>Internship Application Form</h2>

<form id="form">

<input type="text" id="name" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email Address" required>

<input type="text" id="phone" placeholder="Phone">

<textarea id="address" placeholder="Address"></textarea>

<input type="text" id="nationality" placeholder="Nationality">

<input type="text" id="passport" placeholder="Passport Number">

<input type="text" id="university" placeholder="University">

<input type="text" id="degree" placeholder="Degree Program">

<button type="submit">Submit Application</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>

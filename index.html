<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>University of Alinga Internship Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#f5f7fa;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10%;
background:#0F3D5E;
color:white;
}

header a{
color:white;
text-decoration:none;
font-weight:500;
}

/* BANNER */

.banner{
position:relative;
height:350px;
overflow:hidden;
}

.banner img{
width:100%;
height:350px;
object-fit:cover;
filter:brightness(65%);
}

.banner-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
text-align:center;
}

.banner-text h1{
font-size:42px;
margin:0;
}

.banner-text p{
font-size:20px;
}

/* CONTAINER */

.container{
width:65%;
margin:auto;
margin-top:40px;
margin-bottom:80px;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0px 5px 20px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
}

h3{
margin-top:25px;
}

/* FORM */

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

label{
font-size:14px;
font-weight:500;
}

button{
background:#1ABC9C;
color:white;
border:none;
padding:15px;
width:100%;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#148F77;
}

/* FOOTER */

footer{
background:#0F3D5E;
color:white;
text-align:center;
padding:30px;
}

</style>

</head>

<body>

<!-- HEADER -->

<header>

<h2>University of Alinga</h2>

<a href="https://www.uea.ac.uk/" target="_blank">
More Details
</a>

</header>


<!-- BANNER -->

<section class="banner">

<img src="https://drive.google.com/uc?export=view&id=1-iOLOnhJvaY2LZ1PCw8kdDgAQpyvfYA2">

<div class="banner-text">

<h1>International Summer Internship</h1>

<p>Global Research Fellowship Program</p>

</div>

</section>


<!-- FORM -->

<div class="container">

<h2>Internship Application Form</h2>

<form id="form" enctype="multipart/form-data">

<h3>Personal Information</h3>

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email Address" required>

<input type="text" name="phone" placeholder="Phone Number">

<textarea name="address" placeholder="Full Address"></textarea>

<input type="text" name="nationality" placeholder="Nationality">

<input type="text" name="passport" placeholder="Passport Number">

<input type="text" name="university" placeholder="University Name">

<input type="text" name="degree" placeholder="Degree Program">


<h3>Semester Marks</h3>

<input type="text" name="semester1" placeholder="Semester 1 Marks">

<input type="text" name="semester2" placeholder="Semester 2 Marks">

<input type="text" name="semester3" placeholder="Semester 3 Marks">

<input type="text" name="semester4" placeholder="Semester 4 Marks">


<h3>Upload Documents</h3>

<label>Upload Visa</label>
<input type="file" name="visa">

<label>Upload Identity Card</label>
<input type="file" name="idcard">

<label>Upload CV / Resume</label>
<input type="file" name="cv">


<button type="submit">Submit Application</button>

</form>

</div>


<!-- FOOTER -->

<footer>

<p>© 2026 University of Alinga Internship Portal</p>

<p>
<a href="https://www.uea.ac.uk/" target="_blank" style="color:white;">
Visit University of East Anglia
</a>
</p>

</footer>


<script>

document.getElementById("form").addEventListener("submit",function(e){

e.preventDefault()

alert("Application submitted successfully!")

})

</script>

</body>
</html>
